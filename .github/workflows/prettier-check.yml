name: PrettierCheck

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force

      - name: Check code formatting
        run: npm run format:check
